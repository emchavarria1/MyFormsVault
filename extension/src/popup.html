<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Template Autofill</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <h1>Form Template Autofill</h1>
        <p class="muted">Save once. Fill anywhere.</p>
      </header>

      <section class="card">
        <label for="apiBaseUrl">Backend URL</label>
        <div class="row">
          <input id="apiBaseUrl" type="url" placeholder="http://localhost:8787" />
          <button id="saveApiUrl" type="button">Save</button>
        </div>
      </section>

      <section id="authPanel" class="card">
        <div class="tabs" role="tablist" aria-label="Auth mode">
          <button id="tabLogin" class="tab active" type="button">Login</button>
          <button id="tabRegister" class="tab" type="button">Register</button>
        </div>

        <form id="authForm" class="stack">
          <label for="email">Email</label>
          <input id="email" type="email" required autocomplete="email" />

          <label for="password">Password</label>
          <input id="password" type="password" required minlength="8" autocomplete="current-password" />

          <button id="authSubmit" type="submit">Login</button>
          <p id="authError" class="error"></p>
        </form>
      </section>

      <section id="appPanel" class="card hidden">
        <div class="row spread">
          <div>
            <p class="muted">Signed in as</p>
            <p id="userEmail" class="mono"></p>
          </div>
          <button id="logoutButton" type="button" class="ghost">Logout</button>
        </div>

        <label for="templateSelect">Saved templates</label>
        <select id="templateSelect"></select>

        <div class="stack">
          <button id="fillButton" type="button">Fill current page</button>
          <button id="refreshButton" type="button" class="ghost">Refresh templates</button>
        </div>

        <hr />

        <label for="newTemplateName">New template name</label>
        <input id="newTemplateName" type="text" maxlength="120" placeholder="Example: Job Applications" />
        <div class="stack">
          <button id="captureButton" type="button">Save current page values</button>
          <button id="deleteButton" type="button" class="danger">Delete selected template</button>
        </div>

        <hr />

        <p id="activeSiteLabel" class="muted">Active site: unknown</p>

        <label for="mappingSelect">Site mapping profiles</label>
        <select id="mappingSelect"></select>

        <div class="stack compact">
          <button id="newMappingButton" type="button" class="ghost">New mapping draft</button>
        </div>

        <label for="sitePattern">Site pattern</label>
        <input id="sitePattern" type="text" maxlength="500" placeholder="example.com/*" />

        <label for="mappingText">Field map (target=template, one per line)</label>
        <textarea id="mappingText" rows="5" placeholder="firstname=first\nlastname=last\nemail=email"></textarea>

        <div class="stack">
          <button id="saveMappingButton" type="button" class="ghost">Save site mapping</button>
          <button id="deleteMappingButton" type="button" class="danger">Delete selected mapping</button>
        </div>

        <p id="statusMessage" class="status"></p>
      </section>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
